<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Portfolio logo">
  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="32" y1="6" x2="32" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="layer1" x1="16" y1="38" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="layer2" x1="18" y1="28" x2="46" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="layer3" x1="20" y1="16" x2="44" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#shine)"/>
  <rect x="5" y="5" width="54" height="54" rx="13" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Full-stack layers -->
  <path fill="url(#layer1)" d="M14 42h36l-4 8H18l-4-8z"/>
  <path fill="url(#layer2)" d="M18 30h28l-4 8H22l-4-8z"/>
  <path fill="url(#layer3)" d="M22 18h20l-4 8H26l-4-8z"/>
  <!-- Connection node -->
  <circle cx="32" cy="14" r="3.5" fill="#ffffff"/>
  <circle cx="32" cy="14" r="6" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>
  <!-- Side connectors -->
  <path
    d="M32 17.5v2M22 22l2 1.5M42 22l-2 1.5"
    stroke="#ffffff"
    stroke-opacity="0.5"
    stroke-width="1.5"
    stroke-linecap="round"
  />
</svg>
