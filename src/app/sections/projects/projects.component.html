<section class="section" id="projects">
  <app-section-heading
    tag="Projects"
    title="Featured work"
    subtitle="Enterprise systems and personal apps — more on GitHub."
  />

  <div class="projects__toolbar">
    <a [href]="profile.github" target="_blank" rel="noopener noreferrer">
      <p-button label="View GitHub Profile" icon="pi pi-github" [outlined]="true" />
    </a>
  </div>

  <div class="projects__grid">
    @for (project of projects; track project.title; let i = $index) {
      <p-card>
        <ng-template #header>
          <div class="project__header">
            <span class="project__index">{{ (i + 1).toString().padStart(2, '0') }}</span>
            <h3>{{ project.title }}</h3>
          </div>
        </ng-template>
        <p class="project__desc">{{ project.description }}</p>
        <div class="project__stack">
          @for (tech of project.stack; track tech) {
            <p-chip [label]="tech" />
          }
        </div>
        <ul class="project__points">
          @for (point of project.points; track point) {
            <li>{{ point }}</li>
          }
        </ul>
      </p-card>
    }
  </div>
</section>
