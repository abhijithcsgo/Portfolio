version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
      primeng:
        patterns:
          - 'primeng'
          - '@primeng/*'
          - 'primeicons'
